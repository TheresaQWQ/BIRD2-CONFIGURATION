template bgp template_peer {
  local as SELF_ASN;
  graceful restart on;

  ipv4 {
    export none;
    import none;
  };
}

template bgp template_ibgp {
  local as SELF_ASN;
  graceful restart on;
  source address SELF_ADDRESS;
  rr client;

#   ipv6 {
#     next hop self;

#     export filter {
#       peer_setup_export("ibgp", 150184);
#     };

#     import filter {
#       peer_setup_import("ibgp");
#     };
#   };
}

template bgp collector {
  local as SELF_ASN;
  graceful restart on;
  multihop 30;

  ipv4 {
    extended next hop on;
    import all;
    export none;
  };

  ipv6 {
    import all;
    export none;
  };
}
