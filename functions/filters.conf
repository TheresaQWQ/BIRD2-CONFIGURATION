include "./tools.conf";

function prefix_whitelist (prefix set prefix_whitelist) {
  if net !~ prefix_whitelist then {
    print bgp_path.first, ": filtered ", net, "are not in prefix_whitelist";
    reject;
  }
}

function prefix_blacklist (prefix set prefix_blacklist) {
  if net ~ prefix_blacklist then {
    print bgp_path.first, ": filtered ", net, "are in prefix_blacklist";
    reject;
  }
}

function peer_setup_import (string peer_type) {
  if !(peer_type = "upstream" || peer_type = "downstream" || peer_type = "peer" || peer_type = "ixrs" || peer_type = "ibgp") then {
    print "peer_setup: unknown type ", peer_type;
    reject;
  }

  if (net.len > 48) then reject;
  if (net.len < 8) then reject;

  if peer_type = "ibgp" then {
    if bgp_large_community !~ [(SELF_ASN, 114514, *)] then {
      bgp_large_community.add((SELF_ASN, 114514, 1));
    }

    if net ~ BACKBONE_CIDR then {
      print "peer_setup: ", net, " is in backbone CIDR";
      reject;
    }

    bgp_local_pref = 100;

    accept;
  } else if peer_type = "upstream" then {
    bgp_large_community.add((SELF_ASN, 114514, 2));

    bgp_local_pref = 190;
  } else if peer_type = "downstream" then {
    bgp_large_community.add((SELF_ASN, 114514, 3));

    bgp_local_pref = 190;
  } else if peer_type = "ixrs" then {
    bgp_large_community.add((SELF_ASN, 114514, 4));
    
    bgp_local_pref = 200;
  } else if peer_type = "peer" then {
    bgp_large_community.add((SELF_ASN, 114514, 5));

    bgp_local_pref = 200;
  }

  accept;
}

function peer_setup_export (string peer_type; int neighbor_asn) {
  if !(peer_type = "upstream" || peer_type = "downstream" || peer_type = "peer" || peer_type = "ixrs" || peer_type = "ibgp") then {
    print "peer_setup: unknown type ", peer_type;
    reject;
  }

  if (net.len > 48) then reject;
  if (net.len < 8) then reject;

  if peer_type = "ibgp" then {
    if bgp_large_community ~ [(SELF_ASN, 100001, 0)] then {
      reject;
    }

    if net ~ BACKBONE_CIDR then {
      print "peer_setup: ", net, " is in backbone CIDR";
      reject;
    }

    if source ~ [ RTS_BGP, RTS_STATIC ] then {
      accept;
    }

    reject;
  } else if peer_type = "upstream" then {
    if (
      (SELF_ASN, 114514, 2) ~ bgp_large_community
      || (SELF_ASN, 114514, 4) ~ bgp_large_community
      || (SELF_ASN, 114514, 5) ~ bgp_large_community
    ) then {
      # 只导出下游和自己的路由
      reject;
    }

    bgp_large_community.delete([(SELF_ASN, 114514, *)]);

    if bgp_large_community !~ [(SELF_ASN, 100001, *)] then {
      accept;
    }

    if (SELF_ASN, 100001, neighbor_asn) ~ bgp_large_community then {
      bgp_large_community.delete([(SELF_ASN, 100001, *)]);
      accept;
    }

    reject;
  } else if peer_type = "downstream" then {
    bgp_large_community.delete([(SELF_ASN, 114514, *)]);

    if (SELF_ASN, 100001, 0) ~ bgp_large_community then {
      reject;
    }

    bgp_large_community.delete([(SELF_ASN, 100001, *)]);
    bgp_large_community.delete([(SELF_ASN, 114514, *)]);

    if source ~ [ RTS_BGP, RTS_STATIC ] then {
      accept;
    }

    reject;
  } else if peer_type = "peer" then {
    if (SELF_ASN, 100001, 0) ~ bgp_large_community then {
      reject;
    }

    bgp_large_community.delete([(SELF_ASN, 100001, *)]);

    if source ~ [ RTS_STATIC ] then {
      bgp_large_community.delete([(SELF_ASN, 114514, *)]);
      accept;
    }

    if (SELF_ASN, 114514, 1) ~ bgp_large_community then {
      bgp_large_community.delete([(SELF_ASN, 114514, *)]);
      accept;
    }

    reject;
  } else if peer_type = "ixrs" then {
    if bgp_large_community ~ [(SELF_ASN, 100001, 0)] then {
      reject;
    }

    bgp_large_community.delete([(SELF_ASN, 100001, *)]);

    if source ~ [ RTS_STATIC ] then {
      bgp_large_community.delete([(SELF_ASN, 114514, *)]);
      accept;
    }

    if (SELF_ASN, 114514, 1) ~ bgp_large_community then {
      bgp_large_community.delete([(SELF_ASN, 114514, *)]);
      accept;
    }

    if (SELF_ASN, 114514, 3) ~ bgp_large_community then {
      bgp_large_community.delete([(SELF_ASN, 114514, *)]);
      accept;
    }

    reject;
  }
}
