function setup_network_quality (int input_quality) -> int {
  int quality = 0;

  if bgp_large_community ~ [(SELF_ASN, 100002, 1)] then {
    quality = 1;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 2)] then {
    quality = 2;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 3)] then {
    quality = 3;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 4)] then {
    quality = 4;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 5)] then {
    quality = 5;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 6)] then {
    quality = 6;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 7)] then {
    quality = 7;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 8)] then {
    quality = 8;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 9)] then {
    quality = 9;
  }

  if bgp_large_community ~ [(SELF_ASN, 100002, 10)] then {
    quality = 10;
  }

  int final_quality = input_quality + quality;

  if final_quality > 10 then {
    final_quality = 10;
  }

  bgp_large_community.add((SELF_ASN, 100002, final_quality));

  return final_quality * 10;
}
